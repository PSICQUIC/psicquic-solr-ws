image: docker:latest
services:
  - docker:stable-dind
variables:
  DOCKER_TLS_CERTDIR: ""
stages:
  - build-jar
  - build-docker-image
  - kubernetes-deploy

maven-build:
  image: maven:3.6-jdk-11
  stage: build-jar
  before_script:
    - mvn compile install
    - mkdir /builds/intact-ci/psicquic-solr-ws/war_files
  script:
    - mvn clean package -B -s settings.xml -P psicquic-solr-ws -Dpsicquic.filter=source:intact -Dservice.name=intact -Dmaven.test.skip=true
    - mv target/intact-psicquic-ws.war war_files/
    - mvn clean package -B -s settings.xml -P psicquic-solr-ws -Dpsicquic.filter=source:uniprot -Dservice.name=uniprot -Dmaven.test.skip=true
    - mv target/uniprot-psicquic-ws.war war_files/
    - mvn clean package -B -s settings.xml -P psicquic-solr-ws -Dpsicquic.filter=source:mbinfo -Dservice.name=mbinfo -Dmaven.test.skip=true
    - mv target/mbinfo-psicquic-ws.war war_files/
    - mvn clean package -B -s settings.xml -P psicquic-solr-ws -Dpsicquic.filter=source:mpidb -Dservice.name=mpidb -Dmaven.test.skip=true
    - mv target/mpidb-psicquic-ws.war war_files/
    - mvn clean package -B -s settings.xml -P psicquic-solr-ws -Dpsicquic.filter=source:mint -Dservice.name=mint -Dmaven.test.skip=true
    - mv target/mint-psicquic-ws.war war_files/
    - mvn clean package -B -s settings.xml -P psicquic-solr-ws -Dpsicquic.filter=source:bhf-ucl -Dservice.name=bhf-ucl -Dmaven.test.skip=true
    - mv target/bhf-ucl-psicquic-ws.war war_files/
    - mvn clean package -B -s settings.xml -P psicquic-solr-ws -Dpsicquic.filter=source:hpidb -Dservice.name=hpidb -Dmaven.test.skip=true
    - mv target/hpidb-psicquic-ws.war war_files/
    - mvn clean package -B -s settings.xml -P psicquic-solr-ws -Dpsicquic.filter="(interaction_id:imex OR pubid:imex)" -Dservice.name=imex -Dmaven.test.skip=true
    - mv target/imex-psicquic-ws.war war_files/
    - mvn clean
    - sed -i -e "s|<TOMCAT_MANAGER_PASSWORD>|$TOMCAT_MANAGER_PASSWORD|g" config/tomcat-users.xml
    - POM_VERSION=$(mvn -Dexec.executable='echo' -Dexec.args='${project.version}' --non-recursive exec:exec -q)
    - echo "CONTAINER_IMAGE=${CI_REGISTRY_IMAGE}:${POM_VERSION}" > build.env
  after_script:
    - rm -rf ~/.m2/repository/*
  artifacts:
    paths:
      - war_files/*.war
      - config/*
    reports:
      dotenv: build.env
  when: manual

docker-build:
  stage: build-docker-image
  needs: [ maven-build ]
  before_script:
    - unset DOCKER_HOST
    - unset DOCKER_AUTH_CONFIG
    - docker system prune -af
  script:
    - echo "$CI_DOCKER_HUB_PASSWORD" | docker login -u $CI_DOCKER_HUB_USER --password-stdin
    - echo ${CONTAINER_IMAGE}
    - docker build -t ${CONTAINER_IMAGE} --no-cache .
    - docker image ls
    - docker logout
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
    - docker push ${CONTAINER_IMAGE}
    - docker rmi ${CONTAINER_IMAGE}
    - docker logout "$CI_REGISTRY"

.kubernetes-deploy:
  stage: kubernetes-deploy
  image: alpine
  before_script:
    - apk add --no-cache curl git
    - curl -LO https://storage.googleapis.com/kubernetes-release/release/$(curl -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl
    - chmod +x ./kubectl
    - mv ./kubectl /usr/local/bin/kubectl
    - git clone https://k8s-config-token:${K8S_CONFIG_TOKEN}@gitlab.ebi.ac.uk/intact-ci/k8s-config
    - cd k8s-config
    - git fetch
    - git checkout new-cluster
    - cd -
    - mkdir ~/.kube
    - cp k8s-config/config ~/.kube/
  when: manual

hh-test-deploy:
  extends: [ .kubernetes-deploy ]
  needs: [ maven-build, docker-build ]
  script:
    - kubectl config get-contexts
    - kubectl config use-context hh-intact-test
    - kubectl create secret docker-registry gitlab-registry --docker-server=$CI_REGISTRY --docker-username=$CI_REGISTRY_USER --docker-password=$CI_REGISTRY_PASSWORD --docker-email=$GITLAB_USER_EMAIL --dry-run=client -o yaml | kubectl apply -f -
    - kubectl get secrets gitlab-registry -o yaml
    - sed -i -e "s|<CONTAINER_IMAGE>|$CONTAINER_IMAGE|g" k8s-deploy-config/k8s_deploy.yml
    - kubectl apply -f k8s-deploy-config/k8s_deploy.yml
    - kubectl rollout restart deployment/psicquic-solr-ws-deployment
    - kubectl get nodes

hx-prod-deploy:
  extends: [ .kubernetes-deploy ]
  needs: [ maven-build, docker-build ]
  script:
    - kubectl config get-contexts
    - kubectl config use-context hx-intact-prod
    - kubectl create secret docker-registry gitlab-registry --docker-server=$CI_REGISTRY --docker-username=$CI_REGISTRY_USER --docker-password=$CI_REGISTRY_PASSWORD --docker-email=$GITLAB_USER_EMAIL --dry-run=client -o yaml | kubectl apply -f -
    - kubectl get secrets gitlab-registry -o yaml
    - sed -i -e "s|<CONTAINER_IMAGE>|$CONTAINER_IMAGE|g" k8s-deploy-config/k8s_deploy.yml
    - kubectl apply -f k8s-deploy-config/k8s_deploy.yml
    - kubectl rollout restart deployment/psicquic-solr-ws-deployment
    - kubectl get nodes

hh-prod-deploy:
  extends: [ .kubernetes-deploy ]
  needs: [ maven-build, docker-build ]
  script:
    - kubectl config get-contexts
    - kubectl config use-context hh-intact-prod
    - kubectl create secret docker-registry gitlab-registry --docker-server=$CI_REGISTRY --docker-username=$CI_REGISTRY_USER --docker-password=$CI_REGISTRY_PASSWORD --docker-email=$GITLAB_USER_EMAIL --dry-run=client -o yaml | kubectl apply -f -
    - kubectl get secrets gitlab-registry -o yaml
    - sed -i -e "s|<CONTAINER_IMAGE>|$CONTAINER_IMAGE|g" k8s-deploy-config/k8s_deploy.yml
    - kubectl apply -f k8s-deploy-config/k8s_deploy.yml
    - kubectl rollout restart deployment/psicquic-solr-ws-deployment
    - kubectl get nodes
